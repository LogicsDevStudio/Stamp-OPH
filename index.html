<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบกิจกรรมสะสมแต้ม</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --ink:       #0f0f0f;
            --ink-muted: #6b6b6b;
            --ink-faint: #b0b0b0;
            --surface:   #ffffff;
            --ground:    #f5f5f3;
            --border:    #e4e4e0;
            --accent:    #06c755;      /* LINE green */
            --accent-dk: #04a344;
            --accent-bg: #f0fbf4;
            --danger:    #e53e3e;
            --warn:      #f6ad55;
            --radius-sm: 8px;
            --radius:    14px;
            --radius-lg: 22px;
            --shadow-xs: 0 1px 3px rgba(0,0,0,.06);
            --shadow-sm: 0 2px 10px rgba(0,0,0,.07);
            --shadow:    0 6px 24px rgba(0,0,0,.09);
        }

        * { box-sizing: border-box; }

        html, body {
            font-family: 'Noto Sans Thai', sans-serif;
            background: var(--ground);
            color: var(--ink);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* ───── Layout ───── */
        .app-shell {
            max-width: 430px;
            margin: 0 auto;
            padding: 0 0 40px;
            min-height: 100vh;
        }

        /* ───── Top bar ───── */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-bar .brand {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }
        .top-bar .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            margin-left: auto;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: .5; transform: scale(1.4); }
        }

        /* ───── Section cards ───── */
        .hidden { display: none !important; }

        .section {
            margin: 20px 16px 0;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 28px 22px;
            box-shadow: var(--shadow-sm);
        }

        /* ───── Loading ───── */
        #loadingSection {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding-top: 60px;
        }
        .spinner-ring {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-label {
            font-size: 13px;
            color: var(--ink-muted);
            letter-spacing: .04em;
        }

        /* ───── Section headings ───── */
        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 4px;
        }
        .section-sub {
            font-size: 13px;
            color: var(--ink-muted);
            margin-bottom: 20px;
        }

        /* ───── Form elements ───── */
        .field-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .field-wrap .field-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--ink-faint);
            font-size: 15px;
        }
        .form-control-custom {
            width: 100%;
            padding: 13px 14px 13px 40px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: 'DM Mono', monospace;
            background: var(--ground);
            color: var(--ink);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control-custom:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6,199,85,.12);
            background: var(--surface);
        }

        /* ───── Buttons ───── */
        .btn-primary-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            font-family: 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            transition: background .18s, transform .1s;
        }
        .btn-primary-custom:hover   { background: var(--accent-dk); }
        .btn-primary-custom:active  { transform: scale(.97); }

        .btn-secondary-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: var(--surface);
            color: var(--ink);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            transition: border-color .18s, background .18s;
        }
        .btn-secondary-custom:hover { border-color: var(--ink-muted); background: var(--ground); }

        .btn-danger-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: var(--surface);
            color: var(--danger);
            border: 1.5px solid #fecaca;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            transition: background .18s, border-color .18s;
        }
        .btn-danger-custom:hover { background: #fff5f5; border-color: var(--danger); }

        /* ───── Confirm card ───── */
        .confirm-card {
            background: var(--ground);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-bottom: 20px;
        }
        .confirm-card .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .confirm-card .row-item:last-child { border-bottom: none; }
        .confirm-card .label { color: var(--ink-muted); }
        .confirm-card .value { font-weight: 600; font-family: 'DM Mono', monospace; font-size: 13px; }

        /* ───── Dashboard hero ───── */
        .dashboard-hero {
            margin: 20px 16px 0;
            background: var(--ink);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .dashboard-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 80% -20%, rgba(6,199,85,.35) 0%, transparent 60%);
            pointer-events: none;
        }
        .hero-greeting {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: rgba(255,255,255,.5);
            margin-bottom: 4px;
        }
        .hero-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 24px;
        }
        .points-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .points-number {
            font-size: 56px;
            font-weight: 700;
            line-height: 1;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
        }
        .points-label {
            font-size: 13px;
            color: rgba(255,255,255,.55);
            padding-bottom: 8px;
            font-weight: 500;
        }

        /* ───── QR wrapper ───── */
        .qr-wrapper {
            margin: 20px 16px 0;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .qr-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }
        #qrCodeContainer {
            padding: 12px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .qr-hint {
            font-size: 11px;
            color: var(--ink-faint);
            text-align: center;
        }

        /* ───── Station grid ───── */
        .stations-wrap {
            margin: 20px 16px 0;
        }
        .stations-heading {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 12px;
            padding-left: 2px;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .station-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 6px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            line-height: 1.3;
            text-align: center;
            transition: transform .15s;
        }
        .station-item:active { transform: scale(.96); }
        .station-item .icon { font-size: 20px; line-height: 1; }
        .station-pending   { background: var(--ground); border: 1px solid var(--border); color: var(--ink-faint); }
        .station-completed { background: var(--accent-bg); border: 1px solid rgba(6,199,85,.3); color: var(--accent-dk); }

        /* ───── Action buttons section ───── */
        .actions-wrap {
            margin: 16px 16px 0;
        }

        /* ───── Admin / Staff panels ───── */
        .panel-wrap {
            margin: 16px 16px 0;
            border-radius: var(--radius-lg);
            border: 1.5px dashed;
            padding: 20px;
        }
        .panel-wrap.admin { border-color: #fcd34d; background: #fffbeb; }
        .panel-wrap.staff { border-color: rgba(6,199,85,.4); background: var(--accent-bg); }
        .panel-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 14px;
        }
        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .panel-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 14px 8px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 11px;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            font-family: 'Noto Sans Thai', sans-serif;
            transition: background .15s, border-color .15s;
            text-align: center;
        }
        .panel-btn .p-icon { font-size: 20px; }
        .panel-btn:hover { background: var(--ground); border-color: var(--ink-muted); }
        .panel-btn.highlight {
            background: var(--ink);
            color: #fff;
            border-color: var(--ink);
            grid-column: span 2;
            padding: 16px;
        }
        .panel-btn.highlight:hover { background: #222; }

        /* ───── Scanner ───── */
        #scannerSection .section-title { margin-bottom: 16px; }
        #reader {
            width: 100% !important;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* ───── Data list / table ───── */
        #dataListSection .section-title { margin-bottom: 16px; }
        .table-wrap { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .data-table th {
            background: var(--ground);
            color: var(--ink-muted);
            font-weight: 600;
            font-size: 11px;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: 10px 10px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--ink);
            vertical-align: middle;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--ground); }
        .badge-pts {
            display: inline-block;
            background: var(--accent-bg);
            color: var(--accent-dk);
            font-weight: 700;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
        }
        .tbl-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 11px;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            font-family: 'Noto Sans Thai', sans-serif;
            white-space: nowrap;
        }
        .tbl-action-btn:hover { background: var(--ground); }

        /* ───── Divider ───── */
        .divider { height: 1px; background: var(--border); margin: 20px 0; }

        /* ───── Utilities ───── */
        .mt-10 { margin-top: 10px; }
        .mt-14 { margin-top: 14px; }
        .text-muted-sm { font-size: 12px; color: var(--ink-muted); }
    </style>
</head>
<body>

<div class="app-shell">

    <!-- Top bar -->
    <div class="top-bar">
        <i class="bi bi-patch-check-fill" style="color:var(--accent); font-size:16px;"></i>
        <span class="brand">STAMP</span>
        <div class="dot"></div>
    </div>

    <!-- Loading -->
    <div id="loadingSection" class="section" style="text-align:center;">
        <div class="spinner-ring mx-auto"></div>
        <span class="loading-label">กำลังโหลดข้อมูล...</span>
    </div>

    <!-- Register -->
    <div id="registerSection" class="section hidden">
        <p class="section-title">ลงทะเบียน</p>
        <p class="section-sub">กรอกเลขบัตรประจำตัวประชาชนเพื่อเริ่มใช้งาน</p>
        <div class="field-wrap">
            <i class="bi bi-person-vcard field-icon"></i>
            <input type="text" id="nationalIdInput" maxlength="13" placeholder="เลขบัตรประชาชน 13 หลัก" class="form-control-custom">
        </div>
        <button id="btnCheckId" class="btn-primary-custom">
            <i class="bi bi-search"></i> ตรวจสอบข้อมูล
        </button>
    </div>

    <!-- Confirm -->
    <div id="confirmSection" class="section hidden">
        <p class="section-title">ยืนยันข้อมูล</p>
        <p class="section-sub">โปรดตรวจสอบข้อมูลก่อนยืนยัน</p>
        <div class="confirm-card">
            <div class="row-item">
                <span class="label">ชื่อ-สกุล</span>
                <span class="value" id="confirmName"></span>
            </div>
            <div class="row-item">
                <span class="label">เลขบัตรฯ</span>
                <span class="value" id="confirmId"></span>
            </div>
        </div>
        <div class="d-flex flex-column gap-2">
            <button id="btnConfirmRegister" class="btn-primary-custom">
                <i class="bi bi-check-lg"></i> ยืนยันข้อมูล
            </button>
            <button id="btnCancelRegister" class="btn-danger-custom">
                <i class="bi bi-x-lg"></i> ยกเลิก
            </button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="hidden">

        <!-- Hero card -->
        <div class="dashboard-hero">
            <p class="hero-greeting">ยินดีต้อนรับ</p>
            <p class="hero-name" id="userNameDisplay">—</p>
            <div class="points-row">
                <span class="points-number" id="userPointsDisplay">0</span>
                <span class="points-label">แต้มสะสม</span>
            </div>
        </div>

        <!-- QR Code -->
        <div class="qr-wrapper">
            <span class="qr-label"><i class="bi bi-qr-code me-1"></i> QR ของฉัน</span>
            <div id="qrCodeContainer"></div>
            <p class="qr-hint">แสดง QR Code นี้ให้เจ้าหน้าที่สแกน</p>
        </div>

        <!-- Station status -->
        <div class="stations-wrap">
            <p class="stations-heading"><i class="bi bi-flag me-1"></i>สถานะฐานกิจกรรม</p>
            <div id="stationStatusContainer" class="station-grid"></div>
        </div>

        <!-- Personal log button -->
        <div class="actions-wrap">
            <button id="btnViewPersonalLogs" class="btn-secondary-custom">
                <i class="bi bi-clock-history"></i> ดูประวัติของฉัน
            </button>
        </div>

        <!-- Admin panel -->
        <div id="adminMenuBox" class="panel-wrap admin hidden">
            <p class="panel-title"><i class="bi bi-shield-lock me-1"></i>ผู้ดูแลระบบ</p>
            <div class="panel-grid">
                <button class="panel-btn highlight" id="btnScanQR">
                    <span class="p-icon"><i class="bi bi-qr-code-scan"></i></span>
                    สแกนแจกแต้ม (Admin)
                </button>
                <button class="panel-btn" id="btnManageUsers">
                    <span class="p-icon"><i class="bi bi-people"></i></span>
                    รายชื่อผู้เข้าร่วม
                </button>
                <button class="panel-btn" id="btnManageStations">
                    <span class="p-icon"><i class="bi bi-geo-alt"></i></span>
                    จัดการฐานกิจกรรม
                </button>
                <button class="panel-btn" id="btnManageStaffs">
                    <span class="p-icon"><i class="bi bi-person-badge"></i></span>
                    จัดการเจ้าหน้าที่
                </button>
                <button class="panel-btn" id="btnAdminLogs" style="grid-column:span 2;">
                    <span class="p-icon"><i class="bi bi-journal-text"></i></span>
                    ประวัติการแจกแต้มทั้งหมด
                </button>
            </div>
        </div>

        <!-- Staff panel -->
        <div id="staffMenuBox" class="panel-wrap staff hidden">
            <p class="panel-title"><i class="bi bi-person-workspace me-1"></i>เมนูเจ้าหน้าที่</p>
            <button class="panel-btn highlight" id="btnStaffScanQR">
                <span class="p-icon"><i class="bi bi-qr-code-scan"></i></span>
                สแกนแจกแต้ม
            </button>
        </div>

    </div><!-- /dashboardSection -->

    <!-- Scanner -->
    <div id="scannerSection" class="section hidden">
        <p class="section-title"><i class="bi bi-camera me-2"></i>สแกน QR Code</p>
        <div id="reader"></div>
        <div class="mt-14">
            <button id="closeScannerBtn" class="btn-danger-custom">
                <i class="bi bi-x-circle"></i> ยกเลิกสแกน
            </button>
        </div>
    </div>

    <!-- Data list -->
    <div id="dataListSection" class="section hidden">
        <p class="section-title" id="dataListTitle">ข้อมูล</p>
        <div class="table-wrap">
            <table class="data-table" id="dataTable">
                <thead id="dataHead"></thead>
                <tbody id="dataBody"></tbody>
            </table>
        </div>
        <div class="divider"></div>
        <div class="d-flex flex-column gap-2">
            <button id="addDataBtn" class="btn-secondary-custom hidden">
                <i class="bi bi-plus-lg"></i> เพิ่มข้อมูล
            </button>
            <button id="closeDataBtn" class="btn-secondary-custom">
                <i class="bi bi-arrow-left"></i> กลับหน้าหลัก
            </button>
        </div>
    </div>

</div><!-- /app-shell -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
