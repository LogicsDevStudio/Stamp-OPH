<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบกิจกรรมสะสมแต้ม</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* ============================================================
           DESIGN TOKENS
        ============================================================ */
        :root {
            --ink:         #0f0f0f;
            --ink-muted:   #6b6b6b;
            --ink-faint:   #b0b0b0;
            --surface:     #ffffff;
            --ground:      #f5f5f3;
            --border:      #e4e4e0;
            --accent:      #06c755;
            --accent-dk:   #04a344;
            --accent-bg:   #f0fbf4;
            --danger:      #e53e3e;
            --danger-bg:   #fff5f5;
            --danger-bdr:  #fecaca;
            --warn-bg:     #fffbeb;
            --warn-bdr:    #fcd34d;
            --r-sm:        8px;
            --r:           14px;
            --r-lg:        22px;
            --sh-xs:       0 1px 3px rgba(0,0,0,.06);
            --sh-sm:       0 2px 10px rgba(0,0,0,.07);
            --sh:          0 6px 24px rgba(0,0,0,.09);
        }

        /* ============================================================
           RESET & BASE
        ============================================================ */
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            font-family: 'Noto Sans Thai', sans-serif;
            background: var(--ground);
            color: var(--ink);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           LAYOUT
        ============================================================ */
        .app-shell {
            max-width: 430px;
            margin: 0 auto;
            padding-bottom: 48px;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* ============================================================
           TOP BAR
        ============================================================ */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 200;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-bar__icon {
            font-size: 16px;
            color: var(--accent);
            line-height: 1;
        }
        .top-bar__brand {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }
        .top-bar__spacer { flex: 1; }
        .top-bar__dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1;  transform: scale(1); }
            50%       { opacity: .4; transform: scale(1.5); }
        }

        /* ============================================================
           SECTION CARD
        ============================================================ */
        .section {
            margin: 20px 16px 0;
            background: var(--surface);
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
            padding: 28px 22px;
            box-shadow: var(--sh-sm);
        }

        /* ============================================================
           LOADING
        ============================================================ */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 72px 0 48px;
        }
        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-label {
            font-size: 13px;
            color: var(--ink-muted);
            letter-spacing: .05em;
        }

        /* ============================================================
           TYPOGRAPHY HELPERS
        ============================================================ */
        .sec-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--ink);
            margin: 0 0 4px;
        }
        .sec-sub {
            font-size: 13px;
            color: var(--ink-muted);
            margin: 0 0 22px;
        }

        /* ============================================================
           FORM
        ============================================================ */
        .field-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-faint);
            font-size: 15px;
            pointer-events: none;
        }
        .input-custom {
            width: 100%;
            padding: 13px 14px 13px 40px;
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 15px;
            font-family: 'DM Mono', monospace;
            background: var(--ground);
            color: var(--ink);
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        .input-custom::placeholder { color: var(--ink-faint); }
        .input-custom:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6,199,85,.14);
            background: var(--surface);
        }

        /* ============================================================
           BUTTONS
        ============================================================ */

        /* Primary — filled green */
        .btn-prim {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--r-sm);
            font-size: 15px;
            font-weight: 600;
            font-family: 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            transition: background .15s, transform .1s, box-shadow .15s;
            box-shadow: 0 2px 8px rgba(6,199,85,.25);
        }
        .btn-prim:hover  { background: var(--accent-dk); box-shadow: 0 4px 14px rgba(6,199,85,.3); }
        .btn-prim:active { transform: scale(.97); }

        /* Secondary — outlined */
        .btn-sec {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: var(--surface);
            color: var(--ink);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            transition: border-color .15s, background .15s, transform .1s;
        }
        .btn-sec:hover  { border-color: var(--ink-muted); background: var(--ground); }
        .btn-sec:active { transform: scale(.97); }

        /* Danger — outlined red */
        .btn-danger {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: var(--surface);
            color: var(--danger);
            border: 1.5px solid var(--danger-bdr);
            border-radius: var(--r-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .1s;
        }
        .btn-danger:hover  { background: var(--danger-bg); border-color: var(--danger); }
        .btn-danger:active { transform: scale(.97); }

        /* Panel button — icon card style */
        .panel-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 8px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: 11px;
            font-weight: 600;
            font-family: 'Noto Sans Thai', sans-serif;
            color: var(--ink);
            cursor: pointer;
            text-align: center;
            line-height: 1.35;
            transition: border-color .15s, background .15s, transform .1s;
        }
        .panel-btn:hover  { border-color: var(--ink-muted); background: var(--ground); }
        .panel-btn:active { transform: scale(.96); }
        .panel-btn__icon  { font-size: 22px; line-height: 1; }

        /* Dark variant — full-width CTA inside panels */
        .panel-btn--dark {
            flex-direction: row;
            gap: 10px;
            padding: 16px 20px;
            background: var(--ink);
            color: #fff;
            border-color: var(--ink);
            font-size: 14px;
            font-weight: 600;
            grid-column: span 2;
            box-shadow: var(--sh-xs);
        }
        .panel-btn--dark:hover  { background: #222; border-color: #222; color: #fff; }
        .panel-btn--dark:active { transform: scale(.97); }
        .panel-btn--dark .panel-btn__icon { font-size: 18px; }

        /* Table action button */
        .tbl-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 11px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Noto Sans Thai', sans-serif;
            color: var(--ink);
            cursor: pointer;
            white-space: nowrap;
            transition: background .12s;
        }
        .tbl-btn:hover { background: var(--ground); }

        /* ============================================================
           CONFIRM CARD
        ============================================================ */
        .confirm-card {
            background: var(--ground);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .confirm-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .confirm-row:last-child { border-bottom: none; }
        .confirm-row__label {
            font-size: 13px;
            color: var(--ink-muted);
        }
        .confirm-row__value {
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            color: var(--ink);
        }

        /* ============================================================
           DASHBOARD HERO
        ============================================================ */
        .hero {
            margin: 20px 16px 0;
            background: var(--ink);
            border-radius: var(--r-lg);
            padding: 28px 24px 26px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 85% -15%, rgba(6,199,85,.38) 0%, transparent 58%);
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -20px;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255,255,255,.05);
            border-radius: 50%;
        }
        .hero__greeting {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(255,255,255,.45);
            margin: 0 0 5px;
        }
        .hero__name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 26px;
            position: relative;
        }
        .hero__pts-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            position: relative;
        }
        .hero__pts-number {
            font-size: 58px;
            font-weight: 700;
            line-height: 1;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
        }
        .hero__pts-label {
            font-size: 13px;
            color: rgba(255,255,255,.5);
            font-weight: 500;
            padding-bottom: 8px;
        }

        /* ============================================================
           QR CARD
        ============================================================ */
        .qr-card {
            margin: 16px 16px 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 24px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: var(--sh-sm);
        }
        .qr-card__label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }
        .qr-card__frame {
            padding: 12px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            line-height: 0;
        }
        .qr-card__hint {
            font-size: 11px;
            color: var(--ink-faint);
            text-align: center;
            margin: 0;
        }

        /* ============================================================
           STATIONS SECTION
        ============================================================ */
        .stations-wrap {
            margin: 20px 16px 0;
        }
        .stations-heading {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 12px;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .station-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 14px 6px;
            border-radius: var(--r-sm);
            font-size: 11px;
            font-weight: 600;
            line-height: 1.3;
            text-align: center;
            transition: transform .12s;
        }
        .station-item__icon { font-size: 20px; line-height: 1; }
        .station-item--pending {
            background: var(--ground);
            border: 1px solid var(--border);
            color: var(--ink-faint);
        }
        .station-item--done {
            background: var(--accent-bg);
            border: 1px solid rgba(6,199,85,.3);
            color: var(--accent-dk);
        }

        /* ============================================================
           ACTION ROW
        ============================================================ */
        .actions-row { margin: 14px 16px 0; }

        /* ============================================================
           PANELS  (Admin / Staff)
        ============================================================ */
        .panel {
            margin: 16px 16px 0;
            border-radius: var(--r-lg);
            border: 1.5px dashed var(--border);
            padding: 20px 18px;
        }
        .panel--admin {
            border-color: var(--warn-bdr);
            background: var(--warn-bg);
        }
        .panel--staff {
            border-color: rgba(6,199,85,.35);
            background: var(--accent-bg);
        }
        .panel__title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 14px;
        }
        .panel__grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
        }
        .panel__grid--single {
            display: grid;
            grid-template-columns: 1fr;
        }

        /* Span-2 helper for grid children */
        .col-span-2 { grid-column: span 2; }

        /* ============================================================
           SCANNER
        ============================================================ */
        .scanner-wrap { margin-top: 16px; }
        #reader {
            width: 100% !important;
            border-radius: var(--r-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .scanner-actions { margin-top: 16px; }

        /* ============================================================
           DATA LIST / TABLE
        ============================================================ */
        .table-scroll { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .data-table thead tr { border-bottom: 2px solid var(--border); }
        .data-table th {
            background: var(--ground);
            color: var(--ink-muted);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            padding: 10px;
            text-align: left;
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            color: var(--ink);
            vertical-align: middle;
        }
        .data-table tbody tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover td { background: var(--ground); }

        .badge-pts {
            display: inline-block;
            background: var(--accent-bg);
            color: var(--accent-dk);
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            border-radius: 20px;
            padding: 2px 10px;
        }
        .data-list-footer {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        /* ============================================================
           DIVIDER
        ============================================================ */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
            border: none;
        }

    </style>
</head>
<body>

<div class="app-shell">

    <!-- ── Top bar ──────────────────────────────────────────────── -->
    <div class="top-bar">
        <i class="bi bi-patch-check-fill top-bar__icon"></i>
        <span class="top-bar__brand">Stamp</span>
        <span class="top-bar__spacer"></span>
        <div class="top-bar__dot"></div>
    </div>

    <!-- ── Loading ──────────────────────────────────────────────── -->
    <div id="loadingSection" class="section">
        <div class="loading-wrap">
            <div class="spinner"></div>
            <span class="loading-label">กำลังโหลดข้อมูล...</span>
        </div>
    </div>

    <!-- ── Register ─────────────────────────────────────────────── -->
    <div id="registerSection" class="section hidden">
        <p class="sec-title">ลงทะเบียน</p>
        <p class="sec-sub">กรอกเลขบัตรประจำตัวประชาชนเพื่อเริ่มใช้งาน</p>
        <div class="field-wrap">
            <i class="bi bi-person-vcard field-icon"></i>
            <input type="text" id="nationalIdInput" maxlength="13"
                   placeholder="เลขบัตรประชาชน 13 หลัก" class="input-custom">
        </div>
        <button id="btnCheckId" class="btn-prim">
            <i class="bi bi-search"></i>
            ตรวจสอบข้อมูล
        </button>
    </div>

    <!-- ── Confirm ──────────────────────────────────────────────── -->
    <div id="confirmSection" class="section hidden">
        <p class="sec-title">ยืนยันข้อมูล</p>
        <p class="sec-sub">โปรดตรวจสอบข้อมูลก่อนยืนยัน</p>
        <div class="confirm-card">
            <div class="confirm-row">
                <span class="confirm-row__label">ชื่อ-สกุล</span>
                <span class="confirm-row__value" id="confirmName"></span>
            </div>
            <div class="confirm-row">
                <span class="confirm-row__label">เลขบัตรฯ</span>
                <span class="confirm-row__value" id="confirmId"></span>
            </div>
        </div>
        <div class="d-flex flex-column gap-2">
            <button id="btnConfirmRegister" class="btn-prim">
                <i class="bi bi-check-lg"></i>
                ยืนยันข้อมูล
            </button>
            <button id="btnCancelRegister" class="btn-danger">
                <i class="bi bi-x-lg"></i>
                ยกเลิก
            </button>
        </div>
    </div>

    <!-- ── Dashboard ────────────────────────────────────────────── -->
    <div id="dashboardSection" class="hidden">

        <!-- Hero card -->
        <div class="hero">
            <p class="hero__greeting">ยินดีต้อนรับ</p>
            <p class="hero__name" id="userNameDisplay">—</p>
            <div class="hero__pts-row">
                <span class="hero__pts-number" id="userPointsDisplay">0</span>
                <span class="hero__pts-label">แต้มสะสม</span>
            </div>
        </div>

        <!-- QR Code -->
        <div class="qr-card">
            <span class="qr-card__label">
                <i class="bi bi-qr-code me-1"></i>QR ของฉัน
            </span>
            <div class="qr-card__frame" id="qrCodeContainer"></div>
            <p class="qr-card__hint">แสดง QR Code นี้ให้เจ้าหน้าที่สแกน</p>
        </div>

        <!-- Station status -->
        <div class="stations-wrap">
            <p class="stations-heading">
                <i class="bi bi-flag-fill me-1"></i>สถานะฐานกิจกรรม
            </p>
            <div id="stationStatusContainer" class="station-grid"></div>
        </div>

        <!-- Personal log -->
        <div class="actions-row">
            <button id="btnViewPersonalLogs" class="btn-sec">
                <i class="bi bi-clock-history"></i>
                ดูประวัติของฉัน
            </button>
        </div>

        <!-- Admin panel -->
        <div id="adminMenuBox" class="panel panel--admin hidden">
            <p class="panel__title">
                <i class="bi bi-shield-lock me-1"></i>ผู้ดูแลระบบ
            </p>
            <div class="panel__grid">
                <button class="panel-btn panel-btn--dark col-span-2" id="btnScanQR">
                    <span class="panel-btn__icon"><i class="bi bi-qr-code-scan"></i></span>
                    สแกนแจกแต้ม (Admin)
                </button>
                <button class="panel-btn" id="btnManageUsers">
                    <span class="panel-btn__icon"><i class="bi bi-people"></i></span>
                    รายชื่อผู้เข้าร่วม
                </button>
                <button class="panel-btn" id="btnManageStations">
                    <span class="panel-btn__icon"><i class="bi bi-geo-alt"></i></span>
                    จัดการฐาน
                </button>
                <button class="panel-btn" id="btnManageStaffs">
                    <span class="panel-btn__icon"><i class="bi bi-person-badge"></i></span>
                    จัดการเจ้าหน้าที่
                </button>
                <button class="panel-btn" id="btnAdminLogs">
                    <span class="panel-btn__icon"><i class="bi bi-journal-text"></i></span>
                    ประวัติแจกแต้มทั้งหมด
                </button>
            </div>
        </div>

        <!-- Staff panel -->
        <div id="staffMenuBox" class="panel panel--staff hidden">
            <p class="panel__title">
                <i class="bi bi-person-workspace me-1"></i>เมนูเจ้าหน้าที่
            </p>
            <div class="panel__grid--single">
                <button class="panel-btn panel-btn--dark" id="btnStaffScanQR">
                    <span class="panel-btn__icon"><i class="bi bi-qr-code-scan"></i></span>
                    สแกนแจกแต้ม
                </button>
            </div>
        </div>

    </div><!-- /dashboardSection -->

    <!-- ── Scanner ──────────────────────────────────────────────── -->
    <div id="scannerSection" class="section hidden">
        <p class="sec-title">
            <i class="bi bi-camera me-2"></i>สแกน QR Code
        </p>
        <div class="scanner-wrap">
            <div id="reader"></div>
        </div>

</div><!-- /app-shell -->
